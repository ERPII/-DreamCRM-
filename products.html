<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - ניהול מוצרים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; text-decoration: none; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar (Updated for all pages) -->
    <aside class="w-72 glass border-l border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">DreamCRM</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Enterprise OS</p>
        </div>
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> דאשבורד</a>
            <a href="customers.html" class="sidebar-item"><span>👥</span> לקוחות</a>
            <a href="tasks.html" class="sidebar-item"><span>✅</span> משימות</a>
            <a href="service.html" class="sidebar-item"><span>🛠️</span> קריאות שירות</a>
            <a href="finance.html" class="sidebar-item"><span>💰</span> כספים</a>
            <a href="leads.html" class="sidebar-item"><span>🎯</span> לידים</a>
            <a href="products.html" class="sidebar-item active"><span>📦</span> מוצרים</a>
            <a href="reports.html" class="sidebar-item"><span>📈</span> דוחות</a>
        </nav>
    </aside>

    <main class="flex-grow p-6 lg:p-10 flex flex-col gap-6">
        <!-- Header -->
        <header class="flex justify-between items-center glass p-6 rounded-3xl">
            <div>
                <h2 class="text-2xl font-black italic">ניהול <span class="text-blue-500">מוצרים ומלאי</span></h2>
                <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">● QR & Media Sync</p>
            </div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-500/20">
                + הוספת מוצר חדש
            </button>
        </header>

        <!-- Search & Filter -->
        <div class="glass p-4 rounded-2xl flex gap-4">
            <input type="text" id="productSearch" placeholder="חפש לפי שם מוצר או מק''ט..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm outline-none focus:border-blue-500 flex-grow">
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will appear here -->
        </div>
    </main>

    <!-- Modal (Add/Edit Product) -->
    <div id="productModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-2xl rounded-[2.5rem] p-8 relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 left-6 text-slate-500 hover:text-white text-xl">✕</button>
            <h3 id="modalTitle" class="text-2xl font-black italic mb-6 text-right">הוספת <span class="text-blue-500">מוצר חדש</span></h3>
            
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-right">
                <input type="hidden" id="editId">
                
                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">שם המוצר</label>
                    <input type="text" id="prodName" required class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">מחיר (₪)</label>
                    <input type="number" id="prodPrice" required class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">מק"ט / קוד פנימי</label>
                    <input type="text" id="prodSku" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">קישור לתמונת מוצר (URL)</label>
                    <input type="url" id="prodImageUrl" placeholder="https://..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none">
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase">קישור חיצוני למוצר (דף נחיתה/רכישה)</label>
                    <input type="url" id="prodExternalUrl" placeholder="https://..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none">
                </div>

                <div class="md:col-span-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl mt-4 transition-all">
                        שמור נתוני מוצר
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDV-ncOuncy-7HZZJnCMe4uis9ZV2QczYw","authDomain":"dreamcrm-2d69d.firebaseapp.com","projectId":"dreamcrm-2d69d","storageBucket":"dreamcrm-2d69d.firebasestorage.app","appId":"1:124987219085:web:87edf1c9024a82950ad6c4"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'dream-crm-ultimate';

        let products = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                syncProducts();
            } else {
                signInAnonymously(auth);
            }
        });

        function syncProducts() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snap) => {
                products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderProducts();
            });
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(p.externalUrl || p.id)}`;
                const imageSrc = p.imageUrl || 'https://via.placeholder.com/300x200?text=No+Image';
                
                return `
                    <div class="glass p-5 rounded-[2rem] product-card flex flex-col gap-4 relative overflow-hidden">
                        <img src="${imageSrc}" class="w-full h-40 object-cover rounded-2xl bg-slate-800" alt="${p.name}">
                        
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-lg">${p.name}</h4>
                                <p class="text-xs text-slate-400">מק"ט: ${p.sku || 'N/A'}</p>
                            </div>
                            <div class="text-left">
                                <span class="text-blue-400 font-black text-xl">₪${p.price}</span>
                            </div>
                        </div>

                        <div class="bg-white p-2 rounded-xl w-fit mx-auto shadow-inner">
                            <img src="${qrUrl}" class="w-24 h-24" alt="QR Code">
                        </div>

                        <div class="flex gap-2 mt-auto">
                            <button onclick="editProduct('${p.id}')" class="flex-grow bg-white/10 hover:bg-white/20 py-2 rounded-lg text-xs font-bold transition-all">ערוך מוצר</button>
                            <button onclick="deleteProduct('${p.id}')" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 p-2 rounded-lg transition-all text-xs">🗑️</button>
                        </div>
                        
                        ${p.externalUrl ? `<a href="${p.externalUrl}" target="_blank" class="absolute top-2 right-2 bg-blue-500 p-2 rounded-full text-[10px]">🔗</a>` : ''}
                    </div>
                `;
            }).join('');
        }

        window.openModal = () => {
            document.getElementById('productForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerHTML = 'הוספת <span class="text-blue-500">מוצר חדש</span>';
            document.getElementById('productModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('productModal').classList.add('hidden');

        window.editProduct = (id) => {
            const p = products.find(prod => prod.id === id);
            if(!p) return;
            
            document.getElementById('editId').value = p.id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodSku').value = p.sku || '';
            document.getElementById('prodImageUrl').value = p.imageUrl || '';
            document.getElementById('prodExternalUrl').value = p.externalUrl || '';
            
            document.getElementById('modalTitle').innerHTML = 'עריכת <span class="text-blue-500">מוצר קיים</span>';
            document.getElementById('productModal').classList.remove('hidden');
        };

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            const productData = {
                name: document.getElementById('prodName').value,
                price: document.getElementById('prodPrice').value,
                sku: document.getElementById('prodSku').value,
                imageUrl: document.getElementById('prodImageUrl').value,
                externalUrl: document.getElementById('prodExternalUrl').value,
                updatedAt: serverTimestamp()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), productData);
                } else {
                    productData.createdAt = serverTimestamp();
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), productData);
                }
                closeModal();
            } catch (err) {
                console.error("Save error:", err);
            }
        });

        window.deleteProduct = async (id) => {
            if(confirm('האם למחוק את המוצר לצמיתות?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
            }
        };

    </script>
</body>
</html>
