<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - קריאות שירות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; text-decoration: none; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        .status-badge { padding: 4px 10px; rounded: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .row-hover:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 glass border-l border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">DreamCRM</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Enterprise OS</p>
        </div>
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> דאשבורד</a>
            <a href="customers.html" class="sidebar-item"><span>👥</span> לקוחות</a>
            <a href="tasks.html" class="sidebar-item"><span>✅</span> משימות</a>
            <a href="service.html" class="sidebar-item active"><span>🛠️</span> קריאות שירות</a>
            <a href="finance.html" class="sidebar-item"><span>💰</span> כספים</a>
            <a href="leads.html" class="sidebar-item"><span>🎯</span> לידים</a>
            <a href="products.html" class="sidebar-item"><span>📦</span> מוצרים</a>
            <a href="reports.html" class="sidebar-item"><span>📈</span> דוחות</a>
        </nav>
    </aside>

    <main class="flex-grow p-6 lg:p-10 flex flex-col gap-6">
        <!-- Header -->
        <header class="flex justify-between items-center glass p-6 rounded-3xl">
            <div>
                <h2 class="text-2xl font-black italic">קריאות <span class="text-yellow-500">שירות</span></h2>
                <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest">● סנכרון לייב פעיל</p>
            </div>
            <button onclick="openModal()" class="bg-yellow-600 hover:bg-yellow-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-yellow-500/20">
                + פתיחת קריאה
            </button>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass p-6 rounded-3xl border-r-4 border-yellow-500">
                <p class="text-slate-400 text-xs font-bold uppercase">קריאות פתוחות</p>
                <h3 id="openCount" class="text-3xl font-black mt-1">0</h3>
            </div>
            <div class="glass p-6 rounded-3xl border-r-4 border-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase">בטיפול</p>
                <h3 id="pendingCount" class="text-3xl font-black mt-1">0</h3>
            </div>
            <div class="glass p-6 rounded-3xl border-r-4 border-green-500">
                <p class="text-slate-400 text-xs font-bold uppercase">נסגרו היום</p>
                <h3 id="closedToday" class="text-3xl font-black mt-1">0</h3>
            </div>
        </div>

        <!-- Service Calls Table -->
        <div class="glass rounded-[2.5rem] overflow-hidden flex-grow">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 class="font-bold">רשימת קריאות פעילה</h3>
                <div class="flex gap-2">
                    <input type="text" id="searchBox" placeholder="חיפוש קריאה..." class="bg-white/5 border border-white/10 rounded-lg px-4 py-1 text-xs outline-none focus:border-yellow-500">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="text-slate-500 text-[10px] uppercase font-black border-b border-white/5">
                            <th class="p-5">מספר</th>
                            <th class="p-5">לקוח</th>
                            <th class="p-5">נושא הקריאה</th>
                            <th class="p-5">דחיפות</th>
                            <th class="p-5">סטטוס</th>
                            <th class="p-5">תאריך פתיחה</th>
                            <th class="p-5">פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="serviceTableBody">
                        <!-- Dynamic Content -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for New Call -->
    <div id="callModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="glass w-full max-w-md rounded-[2rem] p-8 relative">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-slate-500 hover:text-white text-xl">✕</button>
            <h3 class="text-2xl font-black italic mb-6">פתיחת <span class="text-yellow-500">קריאה חדשה</span></h3>
            
            <div class="space-y-4 text-right">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">בחר לקוח</label>
                    <select id="customerSelect" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none focus:border-yellow-500">
                        <!-- Options filled by JS -->
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase">נושא התקלה</label>
                    <input type="text" id="issueTitle" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none focus:border-yellow-500" placeholder="לדוגמה: תקלה במדפסת">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">דחיפות</label>
                        <select id="priority" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none">
                            <option value="נמוכה">נמוכה</option>
                            <option value="בינונית">בינונית</option>
                            <option value="גבוהה">גבוהה</option>
                            <option value="דחוף">דחוף 🔥</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase">טכנאי אחראי</label>
                        <input type="text" id="assignedTech" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mt-1 outline-none" placeholder="שם הטכנאי">
                    </div>
                </div>
                <button onclick="submitCall()" id="submitBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-4 rounded-2xl mt-4 transition-all">
                    פתיחת קריאה במערכת
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDV-ncOuncy-7HZZJnCMe4uis9ZV2QczYw","authDomain":"dreamcrm-2d69d.firebaseapp.com","projectId":"dreamcrm-2d69d","storageBucket":"dreamcrm-2d69d.firebasestorage.app","appId":"1:124987219085:web:87edf1c9024a82950ad6c4"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'dream-crm-ultimate';

        let customers = [];
        let serviceCalls = [];

        // Auth & Init
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                initData();
            } else {
                signInAnonymously(auth);
            }
        });

        function initData() {
            // Sync Customers for the dropdown
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), (snap) => {
                customers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                updateCustomerDropdown();
            });

            // Sync Service Calls
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'service'), (snap) => {
                serviceCalls = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderTable();
                updateStats();
            });
        }

        function updateCustomerDropdown() {
            const select = document.getElementById('customerSelect');
            select.innerHTML = customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function renderTable() {
            const tbody = document.getElementById('serviceTableBody');
            tbody.innerHTML = serviceCalls.map((s, idx) => {
                const priorityColor = s.priority === 'דחוף' ? 'text-red-500' : s.priority === 'גבוהה' ? 'text-orange-500' : 'text-slate-400';
                const statusColor = s.status === 'בוצע' ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-yellow-500';
                
                return `
                    <tr class="row-hover border-b border-white/5 transition-colors">
                        <td class="p-5 text-xs text-slate-500 font-mono">#${1000 + idx}</td>
                        <td class="p-5 font-bold">${s.customerName || 'לקוח כללי'}</td>
                        <td class="p-5 text-sm">${s.issue}</td>
                        <td class="p-5 text-[10px] font-black ${priorityColor}">${s.priority}</td>
                        <td class="p-5">
                            <span class="status-badge ${statusColor}">${s.status || 'פתוח'}</span>
                        </td>
                        <td class="p-5 text-xs text-slate-500">${s.date || 'היום'}</td>
                        <td class="p-5 flex gap-2">
                            <button onclick="changeStatus('${s.id}', 'בוצע')" class="hover:text-green-500 transition-colors">✅</button>
                            <button onclick="deleteCall('${s.id}')" class="hover:text-red-500 transition-colors">🗑️</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats() {
            const open = serviceCalls.filter(s => s.status !== 'בוצע').length;
            const closedToday = serviceCalls.filter(s => s.status === 'בוצע').length; // Simplified for demo
            
            document.getElementById('openCount').innerText = open;
            document.getElementById('pendingCount').innerText = Math.floor(open * 0.4);
            document.getElementById('closedToday').innerText = closedToday;
        }

        window.openModal = () => document.getElementById('callModal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('callModal').classList.add('hidden');

        window.submitCall = async () => {
            const customerId = document.getElementById('customerSelect').value;
            const customerName = customers.find(c => c.id === customerId)?.name || 'לא ידוע';
            const issue = document.getElementById('issueTitle').value;
            const priority = document.getElementById('priority').value;
            const tech = document.getElementById('assignedTech').value;

            if(!issue) return;

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'service'), {
                customerId,
                customerName,
                issue,
                priority,
                tech,
                status: 'פתוח',
                date: new Date().toLocaleDateString('he-IL'),
                createdAt: serverTimestamp()
            });

            closeModal();
            document.getElementById('issueTitle').value = '';
        };

        window.changeStatus = async (id, status) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'service', id);
            await updateDoc(docRef, { status });
        };

        window.deleteCall = async (id) => {
            if(confirm('למחוק את קריאת השירות?')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'service', id));
            }
        };

    </script>
</body>
</html>
