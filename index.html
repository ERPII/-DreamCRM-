<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - כניסה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Assistant', sans-serif; } </style>
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4">
    <div class="bg-[#1e293b]/50 backdrop-blur-2xl p-8 rounded-[2rem] shadow-2xl w-full max-w-[400px] border border-white/5 text-center">
        <div class="mb-8">
            <h1 class="text-3xl font-black text-white italic tracking-tighter">DreamCRM</h1>
            <p class="text-slate-400 text-xs font-bold mt-1">ניהול חכם, בגרסה הכי טובה בעולם</p>
        </div>

        <div class="space-y-3">
            <input type="email" id="loginEmail" placeholder="אימייל" 
                class="w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            
            <input type="password" id="loginPass" placeholder="סיסמה" 
                class="w-full p-4 rounded-xl bg-slate-800/50 border border-slate-700 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            
            <button onclick="resetPassword()" class="text-[10px] text-blue-400 font-bold hover:underline block w-full text-right px-2">שכחת סיסמה?</button>

            <div class="flex gap-2 pt-2">
                <button onclick="registerEmail()" class="flex-1 bg-slate-700/50 hover:bg-slate-700 text-white py-4 rounded-xl font-bold border border-slate-600 transition-all text-sm">יצירת חשבון</button>
                <button onclick="loginEmail()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition-all text-sm shadow-lg shadow-blue-500/20">התחברות</button>
            </div>
            
            <div class="relative py-4 flex items-center">
                <div class="flex-grow border-t border-slate-800"></div>
                <span class="px-3 text-slate-600 text-[10px] font-bold">או</span>
                <div class="flex-grow border-t border-slate-800"></div>
            </div>

            <button onclick="loginWithGoogle()" class="w-full bg-white hover:bg-slate-100 text-slate-900 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-sm shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                התחברות מהירה עם Google
            </button>
        </div>

        <p id="statusMsg" class="mt-6 text-orange-400 text-xs font-bold hidden"></p>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
