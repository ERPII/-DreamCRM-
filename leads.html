<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - ניהול לידים חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        .input-dark { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; outline: none; transition: 0.2s; width: 100%; color: #e2e8f0; font-size: 14px; }
        .input-dark:focus { border-color: #3b82f6; background: rgba(255,255,255,0.07); }
        .lead-card { cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .lead-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-72 glass border-l border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">DreamCRM</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Lead Engine v3.0</p>
        </div>
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> דאשבורד</a>
            <a href="customers.html" class="sidebar-item"><span>👥</span> לקוחות</a>
            <a href="tasks.html" class="sidebar-item"><span>✅</span> משימות</a>
            <a href="service.html" class="sidebar-item"><span>🛠️</span> שירות</a>
            <a href="finance.html" class="sidebar-item"><span>💰</span> כספים</a>
            <a href="leads.html" class="sidebar-item active"><span>🎯</span> לידים</a>
            <a href="products.html" class="sidebar-item"><span>📦</span> מוצרים</a>
            <a href="reports.html" class="sidebar-item"><span>📈</span> דוחות</a>
        </nav>
    </aside>

    <main class="flex-grow p-6 lg:p-12 bg-[#020617]">
        <!-- Header -->
        <header class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-10 gap-6">
            <div>
                <h2 class="text-4xl font-black italic">ניהול <span class="text-blue-500">לידים</span></h2>
                <p class="text-slate-400 text-sm mt-1">צבירת לידים, מעקב סטטוסים והמרות למכירה</p>
            </div>
            <button onclick="openLeadModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-blue-900/20 flex items-center gap-2">
                <span class="text-xl">+</span> ליד חדש
            </button>
        </header>

        <!-- Search & Filters -->
        <section class="glass p-6 rounded-[2rem] mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase px-2">חיפוש</label>
                    <input type="text" id="searchLead" oninput="applyFilters()" placeholder="שם הליד או טלפון..." class="input-dark mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase px-2">מקור הגעה</label>
                    <select id="filterSource" onchange="applyFilters()" class="input-dark mt-1">
                        <option value="">כל המקורות</option>
                        <option value="facebook">פייסבוק</option>
                        <option value="google">גוגל</option>
                        <option value="referral">המלצה</option>
                        <option value="organic">אורגני</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase px-2">סטטוס</label>
                    <select id="filterStatus" onchange="applyFilters()" class="input-dark mt-1">
                        <option value="">כל הסטטוסים</option>
                        <option value="new">חדש</option>
                        <option value="contacted">נוצר קשר</option>
                        <option value="qualified">בשל למכירה</option>
                        <option value="lost">אבוד</option>
                        <option value="converted">הומר ללקוח ✅</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase px-2">נציג מטפל</label>
                    <select id="filterUser" onchange="applyFilters()" class="input-dark mt-1">
                        <option value="">כל הצוות</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Leads Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="leadsContainer">
            <!-- Leads will be injected here -->
        </div>
    </main>

    <!-- Lead Modal -->
    <div id="leadModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-3xl p-10 rounded-[2.5rem] border border-white/10 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 id="modalTitle" class="text-2xl font-black italic text-blue-400">פרטי ליד</h3>
                </div>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white text-2xl">✕</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">שם מלא</label>
                    <input type="text" id="leadName" class="input-dark mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">טלפון</label>
                    <input type="tel" id="leadPhone" class="input-dark mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">אימייל</label>
                    <input type="email" id="leadEmail" class="input-dark mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">מקור הגעה</label>
                    <select id="leadSource" class="input-dark mt-1">
                        <option value="facebook">פייסבוק</option>
                        <option value="google">גוגל</option>
                        <option value="referral">המלצה</option>
                        <option value="organic">אורגני</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">נציג מטפל</label>
                    <select id="leadAssignee" class="input-dark mt-1"></select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">סטטוס</label>
                    <select id="leadStatus" class="input-dark mt-1">
                        <option value="new">חדש</option>
                        <option value="contacted">נוצר קשר</option>
                        <option value="qualified">בשל למכירה</option>
                        <option value="lost">אבוד</option>
                        <option value="converted">הומר ללקוח ✅</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">הערות</label>
                    <textarea id="leadNotes" class="input-dark mt-1 h-24 resize-none"></textarea>
                </div>
            </div>

            <div class="mt-10 flex flex-col md:flex-row gap-4">
                <button id="saveBtn" onclick="saveLeadData()" class="flex-grow bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all shadow-xl flex justify-center items-center gap-2">
                    <span id="saveText">שמור ליד</span>
                    <div id="saveLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
                <button id="deleteBtn" class="bg-red-500/10 text-red-500 px-6 py-4 rounded-2xl font-bold hover:bg-red-500 hover:text-white transition-all">מחק</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDV-ncOuncy-7HZZJnCMe4uis9ZV2QczYw","authDomain":"dreamcrm-2d69d.firebaseapp.com","projectId":"dreamcrm-2d69d","storageBucket":"dreamcrm-2d69d.firebasestorage.app","appId":"1:124987219085:web:87edf1c9024a82950ad6c4"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'dream-crm-ultimate';

        let currentEditingId = null;
        let allLeads = [];
        let usersList = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await loadUsers();
                loadLeads();
            } else {
                signInAnonymously(auth);
            }
        });

        async function loadUsers() {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'users'));
            usersList = snap.docs.map(d => ({id: d.id, ...d.data()}));
            if(usersList.length === 0) usersList = [{id:'u1', name: 'ישראל ישראלי'}, {id:'u2', name: 'מנהל מערכת'}];
            
            const selectors = [document.getElementById('leadAssignee'), document.getElementById('filterUser')];
            selectors.forEach(sel => {
                sel.innerHTML = '<option value="">בחר נציג / הכל</option>';
                usersList.forEach(u => sel.innerHTML += `<option value="${u.id}">${u.name}</option>`);
            });
        }

        function loadLeads() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'leads'), (snap) => {
                allLeads = snap.docs.map(d => ({id: d.id, ...d.data()}));
                applyFilters();
            });
        }

        window.applyFilters = () => {
            const search = document.getElementById('searchLead').value.toLowerCase();
            const source = document.getElementById('filterSource').value;
            const status = document.getElementById('filterStatus').value;
            const user = document.getElementById('filterUser').value;

            const filtered = allLeads.filter(l => {
                const matchSearch = l.name?.toLowerCase().includes(search) || l.phone?.includes(search);
                const matchSource = !source || l.source === source;
                const matchStatus = !status || l.status === status;
                const matchUser = !user || l.assigneeId === user;
                return matchSearch && matchSource && matchStatus && matchUser;
            });
            renderLeads(filtered);
        };

        function renderLeads(leads) {
            const container = document.getElementById('leadsContainer');
            container.innerHTML = leads.length ? leads.map(l => {
                const assignee = usersList.find(u => u.id === l.assigneeId);
                const statusMap = {
                    'new': 'חדש', 'contacted': 'נוצר קשר', 'qualified': 'בשל', 'lost': 'אבוד', 'converted': 'הומר'
                };
                return `
                    <div onclick="openLeadModal('${l.id}')" class="glass p-6 rounded-[2.2rem] lead-card border-r-4 ${l.status === 'converted' ? 'border-green-500' : 'border-blue-500'}">
                        <div class="flex justify-between mb-4">
                            <span class="text-[10px] text-slate-500 font-mono uppercase">${l.source || 'אורגני'}</span>
                            <span class="badge ${l.status === 'converted' ? 'bg-green-500/10 text-green-400' : 'bg-blue-500/10 text-blue-400'}">${statusMap[l.status] || 'חדש'}</span>
                        </div>
                        <h4 class="text-xl font-black italic mb-1">${l.name}</h4>
                        <p class="text-slate-400 text-sm mb-4">${l.phone || 'אין טלפון'}</p>
                        <div class="pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] text-slate-500">נציג: ${assignee ? assignee.name : 'טרם הוקצה'}</span>
                            <button class="text-blue-400 text-xs font-bold">פרטים נוספים ←</button>
                        </div>
                    </div>
                `;
            }).join('') : `<div class="col-span-full py-20 text-center opacity-30 text-2xl font-bold">אין לידים להצגה</div>`;
        }

        window.openLeadModal = (id = null) => {
            currentEditingId = id;
            document.getElementById('leadModal').classList.remove('hidden');
            if (id) {
                const l = allLeads.find(x => x.id === id);
                document.getElementById('leadName').value = l.name || '';
                document.getElementById('leadPhone').value = l.phone || '';
                document.getElementById('leadEmail').value = l.email || '';
                document.getElementById('leadSource').value = l.source || 'facebook';
                document.getElementById('leadAssignee').value = l.assigneeId || '';
                document.getElementById('leadStatus').value = l.status || 'new';
                document.getElementById('leadNotes').value = l.notes || '';
                document.getElementById('deleteBtn').classList.remove('hidden');
            } else {
                document.querySelectorAll('#leadModal input, #leadModal textarea').forEach(i => i.value = '');
                document.getElementById('deleteBtn').classList.add('hidden');
            }
        };

        window.closeModal = () => document.getElementById('leadModal').classList.add('hidden');

        window.saveLeadData = async () => {
            const data = {
                name: document.getElementById('leadName').value,
                phone: document.getElementById('leadPhone').value,
                email: document.getElementById('leadEmail').value,
                source: document.getElementById('leadSource').value,
                assigneeId: document.getElementById('leadAssignee').value,
                status: document.getElementById('leadStatus').value,
                notes: document.getElementById('leadNotes').value,
                updatedAt: serverTimestamp()
            };
            if(!data.name) return alert("שם הוא שדה חובה");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            try {
                if (currentEditingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leads', currentEditingId), data);
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leads'), { ...data, createdAt: serverTimestamp() });
                }
                closeModal();
            } catch (e) { alert("שגיאה בשמירה"); }
            finally { btn.disabled = false; }
        };

        window.deleteLead = async () => {
            if(confirm("למחוק ליד זה?") && currentEditingId) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leads', currentEditingId));
                closeModal();
            }
        };
        document.getElementById('deleteBtn').onclick = window.deleteLead;
    </script>
</body>
</html>
