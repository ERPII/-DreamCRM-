<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - דוחות מערכת מתקדמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        .report-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .report-card:hover { transform: translateY(-5px); border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .category-pill { cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .category-pill.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1e293b; width: 100%; max-width: 1000px; max-height: 90vh; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-grow: 1; flex-direction: column; overflow: hidden; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Loader -->
    <div id="loader" class="loading-overlay hidden">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <div class="text-xl font-bold animate-pulse text-blue-500 italic">מעבד דוח ושומר בענן...</div>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="w-72 glass border-l border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="mb-10">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">DreamCRM</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Next-Gen Management</p>
        </div>
        
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> דאשבורד</a>
            <a href="customers.html" class="sidebar-item"><span>👥</span> לקוחות</a>
            <a href="service.html" class="sidebar-item"><span>🛠️</span> שירות</a>
            <a href="finance.html" class="sidebar-item"><span>💰</span> כספים</a>
            <a href="leads.html" class="sidebar-item"><span>🎯</span> לידים</a>
            <a href="products.html" class="sidebar-item"><span>📦</span> מוצרים</a>
            <a href="reports.html" class="sidebar-item active"><span>📈</span> דוחות</a>
            <a href="users.html" class="sidebar-item"><span>👤</span> משתמשים</a>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5">
             <button onclick="openHistory()" class="sidebar-item w-full text-blue-400"><span>📜</span> היסטוריית דוחות</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-6 lg:p-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-black italic">מרכז <span class="text-blue-500">דוחות</span></h2>
                <p class="text-slate-400 text-sm">ניהול, הפקה ושימור נתוני מערכת בזמן אמת</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openHistory()" class="bg-white/5 border border-white/10 px-5 py-2.5 rounded-xl font-bold hover:bg-white/10 transition-all">
                    🕒 היסטוריה
                </button>
                <div class="relative">
                    <input type="text" id="reportSearch" oninput="filterReports()" placeholder="חפש דוח..." class="bg-white/5 border border-white/10 px-4 py-2.5 rounded-xl text-sm outline-none focus:border-blue-500 w-64">
                </div>
            </div>
        </header>

        <!-- Category Filters -->
        <div class="flex flex-wrap gap-2 mb-8" id="categoryContainer">
            <div class="category-pill active" onclick="setCategory('הכל')">הכל</div>
            <div class="category-pill" onclick="setCategory('מכירות')">💰 מכירות</div>
            <div class="category-pill" onclick="setCategory('לידים')">🎯 לידים</div>
            <div class="category-pill" onclick="setCategory('שירות')">🛠️ שירות</div>
            <div class="category-pill" onclick="setCategory('לקוחות')">👥 לקוחות</div>
            <div class="category-pill" onclick="setCategory('מלאי')">📦 מלאי</div>
            <div class="category-pill" onclick="setCategory('עובדים')">👤 עובדים</div>
        </div>

        <!-- Reports Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="reportsGrid">
            <!-- Reports will be injected here -->
        </div>
    </main>

    <!-- Report Preview Modal (Large View) -->
    <div id="previewModal" class="modal-overlay">
        <div class="modal-content">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <div>
                    <h3 id="previewTitle" class="text-xl font-black italic text-blue-400">שם הדוח</h3>
                    <p id="previewDate" class="text-[10px] text-slate-500"></p>
                </div>
                <button onclick="closePreview()" class="text-2xl opacity-50 hover:opacity-100">✕</button>
            </div>
            <div class="p-8 overflow-y-auto flex-grow bg-[#0f172a]">
                <div id="previewData" class="space-y-4">
                    <!-- Mock Data Table will appear here -->
                </div>
            </div>
            <div class="p-6 border-t border-white/5 flex flex-wrap gap-3 bg-white/5">
                <button id="downloadBtn" class="bg-green-600 hover:bg-green-500 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2">
                    <span>📥</span> הורדה למכשיר (CSV)
                </button>
                <button id="emailBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2">
                    <span>📧</span> שליחה למייל המקושר
                </button>
                <button onclick="closePreview()" class="px-6 py-2.5 font-bold text-slate-400 hover:text-white mr-auto">סגור</button>
            </div>
        </div>
    </div>

    <!-- History Sidebar / Modal -->
    <div id="historyModal" class="modal-overlay">
        <div class="modal-content max-w-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 class="text-xl font-black italic">היסטוריית <span class="text-blue-500">הפקות</span></h3>
                <button onclick="closeHistory()" class="text-2xl opacity-50 hover:opacity-100">✕</button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow bg-[#0f172a]" id="historyList">
                <!-- List of past reports from Firebase -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDV-ncOuncy-7HZZJnCMe4uis9ZV2QczYw","authDomain":"dreamcrm-2d69d.firebaseapp.com","projectId":"dreamcrm-2d69d","storageBucket":"dreamcrm-2d69d.firebasestorage.app","appId":"1:124987219085:web:87edf1c9024a82950ad6c4"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dream-crm-ultimate';

        let user = null;
        let historyData = [];

        // Auth Setup
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (u) loadHistory();
        });

        const reports = [
            { id: 1, category: 'מכירות', title: 'סיכום מכירות חודשי', desc: 'ניתוח הכנסות מול יעדים ברמה חודשית.' },
            { id: 2, category: 'מכירות', title: 'מכירות לפי נציג', desc: 'ביצועי מכירות והמרה לפי סוכן מכירות.' },
            { id: 8, category: 'לידים', title: 'יעילות מקורות הגעה', desc: 'איזה ערוץ שיווק מביא הכי הרבה לידים?' },
            { id: 15, category: 'שירות', title: 'עומס קריאות שירות', desc: 'כמות פניות פתוחות מול סגורות בזמן אמת.' },
            { id: 22, category: 'לקוחות', title: 'פילוח לקוחות VIP', desc: 'רשימת לקוחות בעלי ערך גבוה במיוחד.' },
            { id: 28, category: 'מלאי', title: 'מלאי מתחת למינימום', desc: 'התראות דחופות על מוצרים שחסרים.' },
            { id: 34, category: 'עובדים', title: 'דוח נוכחות חודשי', desc: 'שעות כניסה ויציאה של כלל הצוות.' }
            // רשימה מקוצרת כאן לטובת הקוד, במציאות יש 39
        ];

        let currentCategory = 'הכל';

        window.setCategory = (cat) => {
            currentCategory = cat;
            document.querySelectorAll('.category-pill').forEach(p => {
                p.classList.toggle('active', p.innerText.includes(cat));
            });
            renderReports();
        };

        window.filterReports = () => renderReports();

        function renderReports() {
            const grid = document.getElementById('reportsGrid');
            const search = document.getElementById('reportSearch').value.toLowerCase();
            grid.innerHTML = '';

            const filtered = reports.filter(r => {
                const matchesCat = currentCategory === 'הכל' || r.category === currentCategory;
                const matchesSearch = r.title.toLowerCase().includes(search);
                return matchesCat && matchesSearch;
            });

            filtered.forEach(r => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-[2rem] report-card flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold text-blue-400 bg-blue-400/10 px-2 py-1 rounded uppercase tracking-widest">${r.category}</span>
                            <span class="text-slate-600 text-[10px]">ID: ${r.id}</span>
                        </div>
                        <h4 class="text-lg font-black italic mb-2">${r.title}</h4>
                        <p class="text-slate-400 text-xs leading-relaxed mb-6 flex-grow">${r.desc}</p>
                        <button onclick="generateReport('${r.id}', '${r.title}')" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white py-3 rounded-2xl text-xs font-bold transition-all border border-blue-500/30">
                            🚀 הפק דוח עכשיו
                        </button>
                    </div>
                `;
            });
        }

        window.generateReport = async (id, title) => {
            if (!user) return;
            document.getElementById('loader').classList.remove('hidden');

            // 1. Simulating Data Creation
            const mockData = `תאריך, לקוח, סכום, סטטוס\n2023-10-01, ישראל ישראלי, 5000, שולם\n2023-10-05, חברה בע"מ, 12000, ממתין`;
            
            // 2. Save to Server (Rule 1: Strict Paths)
            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports_history');
            try {
                const docRef = await addDoc(historyRef, {
                    reportId: id,
                    title: title,
                    generatedBy: user.uid,
                    timestamp: serverTimestamp(),
                    data: mockData
                });

                // 3. Show Preview
                showPreview(title, mockData, docRef.id);
            } catch (e) {
                console.error("Error saving report", e);
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        };

        function showPreview(title, data, docId) {
            document.getElementById('previewTitle').innerText = title;
            document.getElementById('previewDate').innerText = `הופק ב: ${new Date().toLocaleString('he-IL')}`;
            
            const rows = data.split('\n');
            let tableHtml = `<table class="w-full text-right text-sm"><thead><tr class="text-blue-400 border-b border-white/10">`;
            rows[0].split(',').forEach(h => tableHtml += `<th class="p-3">${h}</th>`);
            tableHtml += `</tr></thead><tbody>`;
            rows.slice(1).forEach(row => {
                tableHtml += `<tr class="border-b border-white/5">`;
                row.split(',').forEach(c => tableHtml += `<td class="p-3 text-slate-300">${c}</td>`);
                tableHtml += `</tr>`;
            });
            tableHtml += `</tbody></table>`;
            
            document.getElementById('previewData').innerHTML = tableHtml;
            document.getElementById('previewModal').style.display = 'flex';

            // Set Up Download Button
            document.getElementById('downloadBtn').onclick = () => downloadFile(title, data);
            document.getElementById('emailBtn').onclick = () => alert('הדוח נשלח לתיבת המייל של מנהל המערכת.');
        }

        function downloadFile(title, data) {
            const blob = new Blob([data], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `${title}_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.closePreview = () => document.getElementById('previewModal').style.display = 'none';

        // History Management
        window.openHistory = () => {
            document.getElementById('historyModal').style.display = 'flex';
            renderHistory();
        };
        window.closeHistory = () => document.getElementById('historyModal').style.display = 'none';

        function loadHistory() {
            const historyRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports_history');
            onSnapshot(historyRef, (snap) => {
                historyData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            });
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            if (historyData.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 py-10">אין דוחות קודמים להצגה</p>';
                return;
            }
            container.innerHTML = historyData.map(item => `
                <div class="p-4 bg-white/5 rounded-2xl mb-3 border border-white/5 flex justify-between items-center hover:bg-white/10 transition-all">
                    <div>
                        <div class="font-bold text-blue-400">${item.title}</div>
                        <div class="text-[10px] text-slate-500">${item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString('he-IL') : 'ממש עכשיו'}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="viewFromHistory('${item.id}')" class="text-xs bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg">צפה</button>
                        <button onclick="downloadFromHistory('${item.id}')" class="text-xs bg-green-500/20 text-green-400 px-3 py-1 rounded-lg">הורד</button>
                    </div>
                </div>
            `).join('');
        }

        window.viewFromHistory = (id) => {
            const item = historyData.find(x => x.id === id);
            if (item) {
                closeHistory();
                showPreview(item.title, item.data, item.id);
            }
        };

        window.downloadFromHistory = (id) => {
            const item = historyData.find(x => x.id === id);
            if (item) downloadFile(item.title, item.data);
        };

        renderReports();
    </script>
</body>
</html>
