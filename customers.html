<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - ניהול לקוחות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        .customer-card { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .customer-card:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .customer-card.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .tab-btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: bold; color: #94a3b8; transition: 0.2s; }
        .tab-btn.active { background: #3b82f6; color: white; shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Sidebar (Same as Dashboard) -->
    <aside class="w-72 glass border-l border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">DreamCRM</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Enterprise OS</p>
        </div>
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> דאשבורד</a>
            <a href="customers.html" class="sidebar-item active"><span>👥</span> לקוחות</a>
            <a href="tasks.html" class="sidebar-item"><span>✅</span> משימות</a>
            <a href="service.html" class="sidebar-item"><span>🛠️</span> שירות</a>
            <a href="finance.html" class="sidebar-item"><span>💰</span> כספים</a>
            <a href="leads.html" class="sidebar-item"><span>🎯</span> לידים</a>
            <a href="products.html" class="sidebar-item"><span>📦</span> מוצרים</a>
            <a href="reports.html" class="sidebar-item"><span>📈</span> דוחות</a>
        </nav>
    </aside>

    <main class="flex-grow p-6 lg:p-10 flex flex-col gap-6">
        <!-- Top Bar -->
        <header class="flex justify-between items-center glass p-6 rounded-3xl">
            <div>
                <h2 class="text-2xl font-black italic">ניהול <span class="text-blue-500">לקוחות</span></h2>
                <p id="systemStatus" class="text-[10px] text-green-400 font-bold uppercase tracking-widest">● מחובר לשרת בזמן אמת</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="userName" class="text-sm font-bold tracking-tight">ישראל ישראלי</p>
                    <p class="text-[9px] text-blue-400 font-black uppercase">מנהל מערכת</p>
                </div>
                <button onclick="addCustomer()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-500/20">
                    + לקוח חדש
                </button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow">
            <!-- Customer List -->
            <div class="w-full lg:w-1/3 flex flex-col gap-4 overflow-y-auto max-h-[70vh]">
                <div class="glass p-4 rounded-2xl flex items-center gap-3">
                    <span class="text-slate-500">🔍</span>
                    <input type="text" id="searchCustomer" placeholder="חפש שם או טלפון..." class="bg-transparent border-none outline-none text-sm w-full">
                </div>
                <div id="customerList" class="space-y-3">
                    <!-- Dynamic List -->
                    <div class="animate-pulse text-slate-500 text-center py-10">טוען נתונים...</div>
                </div>
            </div>

            <!-- Customer Detail View (The "Sync" Center) -->
            <div id="customerDetail" class="w-full lg:w-2/3 glass rounded-[2.5rem] p-8 hidden flex-col">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h3 id="detName" class="text-3xl font-black italic mb-1 text-white">שם הלקוח</h3>
                        <p id="detDetails" class="text-slate-400 text-sm">אימייל | טלפון | כתובת</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-white/5 hover:bg-white/10 p-2 rounded-lg">✏️</button>
                        <button class="bg-red-500/10 hover:bg-red-500/20 text-red-400 p-2 rounded-lg">🗑️</button>
                    </div>
                </div>

                <!-- Tabs for Synced Data -->
                <div class="flex gap-4 border-b border-white/5 pb-4 mb-6">
                    <button class="tab-btn active" onclick="switchTab('tasks')">משימות (0)</button>
                    <button class="tab-btn" onclick="switchTab('service')">קריאות שירות (0)</button>
                    <button class="tab-btn" onclick="switchTab('finance')">כספים (₪0)</button>
                    <button class="tab-btn" onclick="switchTab('products')">מוצרים</button>
                </div>

                <!-- Content Area -->
                <div id="tabContent" class="flex-grow space-y-4 overflow-y-auto max-h-[40vh]">
                    <!-- Dynamic Content based on Sync -->
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="w-full lg:w-2/3 glass rounded-[2.5rem] p-8 flex items-center justify-center text-slate-500">
                <div class="text-center">
                    <div class="text-6xl mb-4">👤</div>
                    <p class="font-bold">בחר לקוח כדי לצפות בנתונים מסונכרנים</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="flex justify-between items-center text-[10px] text-slate-500 font-bold uppercase py-2">
            <span id="currentTime">00:00:00</span>
            <span>עודכן לאחרונה: <span id="lastUpdate">זה עתה</span></span>
        </footer>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDV-ncOuncy-7HZZJnCMe4uis9ZV2QczYw","authDomain":"dreamcrm-2d69d.firebaseapp.com","projectId":"dreamcrm-2d69d","storageBucket":"dreamcrm-2d69d.firebasestorage.app","appId":"1:124987219085:web:87edf1c9024a82950ad6c4"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'dream-crm-ultimate';

        let selectedCustomerId = null;
        let allData = { tasks: [], service: [], finance: [], customers: [] };

        // Initial Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                startListeners();
            } else {
                signInAnonymously(auth);
            }
        });

        function startListeners() {
            // Live Customers List
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), (snap) => {
                allData.customers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderCustomers();
            });

            // Global Data Listeners for Syncing
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), (snap) => {
                allData.tasks = snap.docs.map(d => d.data());
                if(selectedCustomerId) refreshDetail();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'service'), (snap) => {
                allData.service = snap.docs.map(d => d.data());
                if(selectedCustomerId) refreshDetail();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'finance'), (snap) => {
                allData.finance = snap.docs.map(d => d.data());
                if(selectedCustomerId) refreshDetail();
            });
        }

        function renderCustomers() {
            const list = document.getElementById('customerList');
            list.innerHTML = allData.customers.map(c => `
                <div class="customer-card glass p-5 rounded-2xl ${selectedCustomerId === c.id ? 'selected' : ''}" onclick="selectCustomer('${c.id}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-lg">${c.name}</p>
                            <p class="text-xs text-slate-500">${c.phone || ''}</p>
                        </div>
                        <div class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded-lg font-black">${c.type || 'לקוח'}</div>
                    </div>
                </div>
            `).join('');
        }

        window.selectCustomer = (id) => {
            selectedCustomerId = id;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('customerDetail').classList.remove('hidden');
            renderCustomers(); // Update visual selection
            refreshDetail();
        };

        function refreshDetail() {
            const customer = allData.customers.find(c => c.id === selectedCustomerId);
            if(!customer) return;

            document.getElementById('detName').innerText = customer.name;
            document.getElementById('detDetails').innerText = `${customer.email || ''} | ${customer.phone || ''} | ${customer.address || ''}`;

            // Sync Filtering: Get all items related to THIS customer name/ID
            const myTasks = allData.tasks.filter(t => t.customerId === selectedCustomerId || t.customerName === customer.name);
            const myService = allData.service.filter(s => s.customerId === selectedCustomerId || s.customerName === customer.name);
            const myFinance = allData.finance.filter(f => f.customerId === selectedCustomerId || f.customerName === customer.name);

            // Update Tab Labels
            const btns = document.querySelectorAll('.tab-btn');
            btns[0].innerText = `משימות (${myTasks.length})`;
            btns[1].innerText = `קריאות שירות (${myService.length})`;
            
            const totalCash = myFinance.reduce((sum, f) => sum + (Number(f.amount) || 0), 0);
            btns[2].innerText = `כספים (₪${totalCash.toLocaleString()})`;

            // Default to showing tasks
            window.switchTab('tasks');
        }

        window.switchTab = (type) => {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            const targetBtn = Array.from(btns).find(b => b.getAttribute('onclick').includes(type));
            if(targetBtn) targetBtn.classList.add('active');

            const container = document.getElementById('tabContent');
            const customer = allData.customers.find(c => c.id === selectedCustomerId);
            
            if(type === 'tasks') {
                const filtered = allData.tasks.filter(t => t.customerId === selectedCustomerId || t.customerName === customer.name);
                container.innerHTML = filtered.length ? filtered.map(t => `
                    <div class="flex justify-between p-4 bg-white/5 rounded-xl border-r-4 border-blue-500">
                        <p class="text-sm font-bold">${t.title}</p>
                        <span class="text-[10px] text-slate-500">${t.dueDate || 'ללא תאריך'}</span>
                    </div>
                `).join('') : '<p class="text-slate-500 text-center py-4">אין משימות פתוחות</p>';
            }

            if(type === 'service') {
                const filtered = allData.service.filter(s => s.customerId === selectedCustomerId || s.customerName === customer.name);
                container.innerHTML = filtered.length ? filtered.map(s => `
                    <div class="flex justify-between p-4 bg-white/5 rounded-xl border-r-4 border-yellow-500">
                        <div>
                            <p class="text-sm font-bold">${s.issue}</p>
                            <p class="text-[10px] text-slate-500">סטטוס: ${s.status || 'פתוח'}</p>
                        </div>
                        <span class="text-[10px] text-slate-400">${s.date || ''}</span>
                    </div>
                `).join('') : '<p class="text-slate-500 text-center py-4">אין קריאות שירות פתוחות</p>';
            }

            if(type === 'finance') {
                const filtered = allData.finance.filter(f => f.customerId === selectedCustomerId || f.customerName === customer.name);
                container.innerHTML = filtered.length ? filtered.map(f => `
                    <div class="flex justify-between p-4 bg-white/5 rounded-xl border-r-4 border-green-500">
                        <div>
                            <p class="text-sm font-bold">${f.description || 'עסקה'}</p>
                            <p class="text-[10px] text-slate-500">${f.date || ''}</p>
                        </div>
                        <span class="font-black text-green-400">₪${Number(f.amount).toLocaleString()}</span>
                    </div>
                `).join('') : '<p class="text-slate-500 text-center py-4">אין תנועות כספיות</p>';
            }
        };

        // Time update
        setInterval(() => {
            document.getElementById('currentTime').innerText = new Date().toLocaleTimeString('he-IL');
        }, 1000);

    </script>
</body>
</html>
