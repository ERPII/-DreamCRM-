<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamCRM - ניהול לקוחות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94a3b8; transition: all 0.2s; font-weight: 600; }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-right: 4px solid #3b82f6; }
        .input-dark { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; outline: none; transition: 0.2s; width: 100%; color: #e2e8f0; }
        .input-dark:focus { border-color: #3b82f6; background: rgba(255,255,255,0.07); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .customer-row:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="loader" class="loading-overlay">
        <div class="text-xl font-bold animate-pulse text-blue-500 italic">טוען נתונים...</div>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="w-72 glass border-l border-white/5 p-8 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="mb-10">
            <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">DreamCRM</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Next-Gen Management</p>
        </div>
        
        <nav class="space-y-2 flex-grow">
            <a href="dashboard.html" class="sidebar-item"><span>📊</span> דאשבורד</a>
            <a href="customers.html" class="sidebar-item active"><span>👥</span> לקוחות</a>
            <a href="service.html" class="sidebar-item"><span>🛠️</span> שירות</a>
            <a href="finance.html" class="sidebar-item"><span>💰</span> כספים</a>
            <a href="leads.html" class="sidebar-item"><span>🎯</span> לידים</a>
            <a href="products.html" class="sidebar-item"><span>📦</span> מוצרים</a>
            <a href="reports.html" class="sidebar-item"><span>📈</span> דוחות</a>
            <a href="users.html" class="sidebar-item"><span>👤</span> משתמשים</a>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/5">
            <button onclick="logout()" class="sidebar-item text-red-400 w-full text-right"><span>🚪</span> התנתק</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow p-6 lg:p-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-black italic">ניהול <span class="text-blue-500">לקוחות</span></h2>
                <p class="text-slate-400 text-sm">מאגר לקוחות מלא, היסטוריית התקשרות וניהול כרטיסים</p>
            </div>
            <button onclick="openCustomerModal()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                + לקוח חדש
            </button>
        </header>

        <!-- Filters & Search -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="md:col-span-2">
                <input type="text" id="searchInput" oninput="filterCustomers()" placeholder="חפש לפי שם, טלפון או אימייל..." class="input-dark py-3 px-5">
            </div>
            <select id="filterType" onchange="filterCustomers()" class="input-dark">
                <option value="all">כל סוגי הלקוחות</option>
                <option value="פרטי">פרטי</option>
                <option value="עסקי">עסקי</option>
                <option value="VIP">VIP</option>
            </select>
            <div class="flex items-center glass px-4 rounded-xl text-slate-400 text-sm">
                <span>סה"כ מוצגים: </span>
                <span id="customerCount" class="mr-2 font-bold text-white">0</span>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="glass rounded-[2rem] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="text-slate-500 text-[10px] font-bold uppercase tracking-widest border-b border-white/5 bg-white/5">
                            <th class="p-6">שם לקוח</th>
                            <th class="p-6">סוג</th>
                            <th class="p-6">אימייל וטלפון</th>
                            <th class="p-6">סטטוס</th>
                            <th class="p-6">פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Customer Modal -->
    <div id="customerModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-4xl h-[85vh] rounded-[2.5rem] flex flex-col overflow-hidden border border-white/10">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 id="modalTitle" class="text-xl font-black italic text-blue-400">פרטי לקוח</h3>
                <button onclick="closeModal()" class="text-xl opacity-50 hover:opacity-100">✕</button>
            </div>

            <div class="flex-grow overflow-y-auto p-8">
                <form id="customerForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="hidden" id="customerId">
                    
                    <div class="space-y-4">
                        <h4 class="text-blue-400 font-bold text-xs uppercase tracking-widest mb-2">מידע בסיסי</h4>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">שם מלא / חברה</label>
                            <input type="text" id="custName" class="input-dark mt-1" required>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">ח"פ / ת.ז</label>
                            <input type="text" id="custTaxId" class="input-dark mt-1">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">אימייל</label>
                            <input type="email" id="custEmail" class="input-dark mt-1">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">טלפון</label>
                            <input type="text" id="custPhone" class="input-dark mt-1">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h4 class="text-blue-400 font-bold text-xs uppercase tracking-widest mb-2">סיווג וכתובת</h4>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">סוג לקוח</label>
                            <select id="custType" class="input-dark mt-1">
                                <option value="פרטי">פרטי</option>
                                <option value="עסקי">עסקי</option>
                                <option value="VIP">VIP</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">כתובת</label>
                            <input type="text" id="custAddress" class="input-dark mt-1">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase">סטטוס</label>
                            <select id="custStatus" class="input-dark mt-1">
                                <option value="פעיל">פעיל</option>
                                <option value="לא פעיל">לא פעיל</option>
                                <option value="בהקפאה">בהקפאה</option>
                            </select>
                        </div>
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">הערות ומידע נוסף</label>
                        <textarea id="custNotes" class="input-dark mt-1 h-32"></textarea>
                    </div>
                </form>
            </div>

            <div class="p-6 border-t border-white/5 flex justify-end gap-3 bg-white/5">
                <button onclick="closeModal()" class="px-8 py-3 font-bold opacity-50">ביטול</button>
                <button id="saveBtn" onclick="saveCustomer()" class="bg-blue-600 px-12 py-3 rounded-2xl font-black shadow-lg shadow-blue-900/40">שמור לקוח</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyDV-ncOuncy-7HZZJnCMe4uis9ZV2QczYw","authDomain":"dreamcrm-2d69d.firebaseapp.com","projectId":"dreamcrm-2d69d","storageBucket":"dreamcrm-2d69d.firebasestorage.app","appId":"1:124987219085:web:87edf1c9024a82950ad6c4"}');

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dream-crm-ultimate';

        let allCustomers = [];

        // Auth
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            document.getElementById('loader').classList.add('hidden');
            
            // Listen to customers
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
            onSnapshot(ref, (snap) => {
                allCustomers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                filterCustomers();
            });
        });

        window.filterCustomers = () => {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('filterType').value;
            
            const filtered = allCustomers.filter(c => {
                const matchesSearch = (c.name || '').toLowerCase().includes(searchTerm) || 
                                    (c.phone || '').includes(searchTerm) ||
                                    (c.email || '').toLowerCase().includes(searchTerm);
                const matchesType = typeFilter === 'all' || c.type === typeFilter;
                return matchesSearch && matchesType;
            });

            renderCustomers(filtered);
        };

        function renderCustomers(data) {
            const body = document.getElementById('customersTableBody');
            document.getElementById('customerCount').innerText = data.length;
            body.innerHTML = '';

            data.forEach(c => {
                body.innerHTML += `
                    <tr class="border-b border-white/5 customer-row transition-all">
                        <td class="p-6 font-bold text-white">${c.name}</td>
                        <td class="p-6 text-slate-400 text-sm">${c.type || 'פרטי'}</td>
                        <td class="p-6">
                            <div class="text-white text-xs">${c.email || '-'}</div>
                            <div class="text-slate-500 text-[10px] mt-1">${c.phone || '-'}</div>
                        </td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${c.status === 'פעיל' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
                                ${c.status || 'פעיל'}
                            </span>
                        </td>
                        <td class="p-6">
                            <button onclick="openCustomerModal('${c.id}')" class="text-blue-400 hover:text-blue-300 font-bold text-xs">ערוך ✎</button>
                        </td>
                    </tr>
                `;
            });
        }

        window.openCustomerModal = (id = null) => {
            document.getElementById('customerForm').reset();
            document.getElementById('customerId').value = id || '';
            document.getElementById('modalTitle').innerText = id ? "עריכת לקוח" : "הוספת לקוח חדש";
            
            if (id) {
                const c = allCustomers.find(x => x.id === id);
                if (c) {
                    document.getElementById('custName').value = c.name || '';
                    document.getElementById('custTaxId').value = c.taxId || '';
                    document.getElementById('custEmail').value = c.email || '';
                    document.getElementById('custPhone').value = c.phone || '';
                    document.getElementById('custType').value = c.type || 'פרטי';
                    document.getElementById('custAddress').value = c.address || '';
                    document.getElementById('custStatus').value = c.status || 'פעיל';
                    document.getElementById('custNotes').value = c.notes || '';
                }
            }
            document.getElementById('customerModal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('customerModal').classList.add('hidden');

        window.saveCustomer = async () => {
            const id = document.getElementById('customerId').value;
            const data = {
                name: document.getElementById('custName').value,
                taxId: document.getElementById('custTaxId').value,
                email: document.getElementById('custEmail').value,
                phone: document.getElementById('custPhone').value,
                type: document.getElementById('custType').value,
                address: document.getElementById('custAddress').value,
                status: document.getElementById('custStatus').value,
                notes: document.getElementById('custNotes').value,
                updatedAt: serverTimestamp()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', id), data);
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), data);
                }
                closeModal();
            } catch (err) {
                console.error("Save error", err);
            }
        };

        window.logout = () => {
            // Log out logic
        };
    </script>
</body>
</html>
